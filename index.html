<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" id="themeColorMeta">
<title>ARCHITECTURE MAP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#ffffff;
    --bg-2:#fafafa;
    --ink:#0a0a0a;
    --ink-2:#404040;
    --ink-3:#737373;
    --line:#e5e5e5;
    --line-2:#f0f0f0;
    --hover:#f5f5f5;
    --shadow:0 8px 30px rgba(0,0,0,.10);
    --me-dot:#0a0a0a;
    --me-halo:rgba(10,10,10,.10);
    --serif:"Cormorant Garamond", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --sans:"Inter", "Hiragino Sans", "Yu Gothic", -apple-system, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
    --safe-top:env(safe-area-inset-top, 0px);
    --safe-bottom:env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"]{
    --bg:#0e0e10;
    --bg-2:#161618;
    --ink:#f5f5f5;
    --ink-2:#c4c4c4;
    --ink-3:#8a8a8a;
    --line:#262628;
    --line-2:#1c1c1e;
    --hover:#1c1c1e;
    --shadow:0 8px 30px rgba(0,0,0,.6);
    --me-dot:#ffffff;
    --me-halo:rgba(255,255,255,.18);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--bg); color:var(--ink);
    font-family:var(--sans); font-weight:400; -webkit-font-smoothing:antialiased;
    transition:background .25s ease, color .25s ease;
  }
  button{font-family:inherit; color:inherit;}

  #app{
    display:grid; grid-template-rows:auto 1fr; height:100dvh;
    position:relative; padding-top:var(--safe-top);
  }

  header{
    background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:11px 14px;
    display:flex; align-items:center; gap:8px;
    z-index:1100;
  }
  .brand{display:flex; align-items:baseline; gap:9px; flex:1; min-width:0;}
  .brand .mark{ width:20px; height:20px; flex-shrink:0; color:var(--ink); }
  .brand h1{
    font-family:var(--serif); font-weight:500;
    font-size:19px; letter-spacing:.04em; margin:0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    line-height:1;
  }
  .brand .sub{
    font-family:var(--mono); font-size:9px; color:var(--ink-3);
    letter-spacing:.18em; text-transform:uppercase;
    border-left:1px solid var(--line); padding-left:8px;
    white-space:nowrap;
  }
  @media (max-width:540px){
    .brand .sub{display:none;}
    .brand h1{font-size:17px;}
  }

  .icon-btn{
    background:transparent; border:1px solid var(--line);
    width:38px; height:38px; padding:0; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition:background .15s ease, border-color .15s ease, color .15s ease;
  }
  .icon-btn:hover{background:var(--hover); border-color:var(--ink-3);}
  .icon-btn.active{background:var(--ink); color:var(--bg); border-color:var(--ink);}
  .icon-btn svg{width:18px; height:18px; display:block;}
  .icon-btn.loading svg{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  #panel{
    position:absolute; left:0; right:auto; bottom:0;
    top:calc(61px + var(--safe-top));
    width:340px; max-width:88%;
    background:var(--bg);
    border-right:1px solid var(--line);
    z-index:1050; overflow-y:auto;
    transform:translateX(-100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1), background .25s ease;
    padding-bottom:var(--safe-bottom);
    -webkit-overflow-scrolling:touch;
  }
  #panel.open{transform:translateX(0); box-shadow:var(--shadow);}

  .panel-section{padding:20px; border-bottom:1px solid var(--line);}
  .panel-label{
    font-family:var(--mono); font-size:10px; color:var(--ink-3);
    letter-spacing:.2em; text-transform:uppercase; margin-bottom:14px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .panel-label .count{color:var(--ink);}

  .action-row{display:flex; gap:8px; margin-bottom:14px;}
  .action-row button{
    flex:1; background:transparent; border:1px solid var(--line);
    padding:9px 10px; font-size:11px; cursor:pointer; color:var(--ink);
    font-family:var(--mono); letter-spacing:.1em; text-transform:uppercase;
    transition:all .15s ease;
  }
  .action-row button:hover, .action-row button:active{
    background:var(--ink); color:var(--bg); border-color:var(--ink);
  }

  .cat-list{display:flex; flex-direction:column; gap:1px; background:var(--line); border:1px solid var(--line);}
  .cat-item{
    display:flex; align-items:center; gap:12px;
    padding:13px 14px; background:var(--bg);
    cursor:pointer; font-size:13px; user-select:none;
    transition:background .12s ease;
  }
  .cat-item:hover{background:var(--hover);}
  .cat-item input{
    appearance:none; -webkit-appearance:none;
    width:15px; height:15px; border:1px solid var(--ink-3);
    margin:0; flex-shrink:0; position:relative; cursor:pointer;
    background:var(--bg);
  }
  .cat-item input:checked{background:var(--ink); border-color:var(--ink);}
  .cat-item input:checked::after{
    content:""; position:absolute; left:3.5px; top:0.5px;
    width:4px; height:8px; border:solid var(--bg);
    border-width:0 1.5px 1.5px 0; transform:rotate(45deg);
  }
  .cat-swatch{
    width:10px; height:10px; flex-shrink:0;
    border:1px solid rgba(125,125,125,.4);
  }
  .cat-name{flex:1; letter-spacing:.02em;}
  .cat-num{ font-family:var(--mono); font-size:11px; color:var(--ink-3); }
  .cat-item.off .cat-name, .cat-item.off .cat-num{opacity:.4;}
  .cat-item.off .cat-swatch{opacity:.3;}

  .about{font-size:11px; color:var(--ink-3); line-height:1.75;}

  #map{width:100%; height:100%; background:var(--bg-2);}
  .leaflet-container{font-family:var(--sans); background:var(--bg-2) !important;}
  .leaflet-control-zoom{
    border:1px solid var(--line) !important; box-shadow:none !important;
    margin-right:14px !important;
  }
  .leaflet-control-zoom a{
    background:var(--bg) !important; color:var(--ink) !important;
    border-bottom:1px solid var(--line) !important;
    font-weight:300 !important; width:36px !important; height:36px !important;
    line-height:36px !important;
  }
  .leaflet-control-zoom a:hover{background:var(--hover) !important;}
  .leaflet-control-attribution{
    background:rgba(255,255,255,.85) !important;
    font-size:9px !important; color:var(--ink-3) !important;
    font-family:var(--mono);
  }
  [data-theme="dark"] .leaflet-control-attribution{
    background:rgba(14,14,16,.85) !important;
  }
  .leaflet-control-attribution a{color:var(--ink-2) !important;}

  .poi-marker{
    width:30px; height:38px; position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .poi-marker svg{width:100%; height:100%; display:block; overflow:visible;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
  .me-marker{
    width:16px; height:16px; border-radius:50%;
    background:var(--me-dot); border:2.5px solid var(--bg);
    box-shadow:0 0 0 1.5px var(--me-dot), 0 0 0 10px var(--me-halo);
    position:relative;
  }
  .me-marker::after{
    content:""; position:absolute; inset:-10px; border-radius:50%;
    background:var(--me-dot); opacity:.18; animation:pulse 2s ease-out infinite;
  }
  @keyframes pulse{
    0%{transform:scale(.5); opacity:.4;}
    100%{transform:scale(1.6); opacity:0;}
  }

  .leaflet-popup-content-wrapper{
    border-radius:0 !important; box-shadow:var(--shadow) !important;
    border:1px solid var(--line);
    background:var(--bg) !important; color:var(--ink) !important;
  }
  .leaflet-popup-content{margin:0 !important; width:270px !important;}
  .leaflet-popup-tip{box-shadow:none !important; background:var(--bg) !important;}
  .leaflet-popup-close-button{
    color:var(--ink-2) !important; padding:8px 10px 0 0 !important;
    font-size:20px !important;
  }

  .pop{padding:0;}
  .pop-thumb{
    width:100%; height:150px; object-fit:cover; display:block;
    background:var(--bg-2);
  }
  [data-theme="dark"] .pop-thumb{filter:brightness(.85);}
  .pop-body{padding:15px 16px 16px;}
  .pop-cat{
    display:flex; align-items:center; gap:8px; margin-bottom:8px;
    font-family:var(--mono); font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--ink-2);
  }
  .pop-cat .dot{width:8px; height:8px; flex-shrink:0;}
  .pop-title{
    font-family:var(--serif); font-weight:500; font-size:19px;
    line-height:1.3; margin:0 0 6px; letter-spacing:.01em; color:var(--ink);
  }
  .pop-addr{
    font-size:11px; color:var(--ink-3); margin-bottom:10px;
    padding-bottom:10px; border-bottom:1px solid var(--line);
    line-height:1.5;
  }
  .pop-desc{
    font-size:12px; color:var(--ink-2); line-height:1.65;
    max-height:120px; overflow-y:auto; margin-bottom:12px;
  }
  .pop-link{
    display:inline-flex; align-items:center; gap:6px;
    padding:9px 13px; background:var(--ink); color:var(--bg) !important;
    text-decoration:none; font-family:var(--mono); font-size:10px;
    letter-spacing:.18em; text-transform:uppercase;
    transition:opacity .15s ease;
  }
  .pop-link:hover{opacity:.85;}
  .pop-link svg{width:11px; height:11px;}

  #toast{
    position:absolute; left:50%; bottom:calc(28px + var(--safe-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:var(--bg);
    padding:10px 18px; font-size:11px; letter-spacing:.15em;
    text-transform:uppercase; font-family:var(--mono);
    z-index:2000; opacity:0; pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  #loading{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:var(--bg); border:1px solid var(--line);
    padding:18px 28px; z-index:2000;
    font-family:var(--mono); font-size:11px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--ink-2);
  }

  #overlay{
    position:absolute; inset:calc(61px + var(--safe-top)) 0 0 0;
    background:rgba(0,0,0,.35); z-index:1040;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
    backdrop-filter:blur(2px);
  }
  #overlay.show{opacity:1; pointer-events:auto;}

  .map-controls{
    position:absolute; right:14px; bottom:calc(28px + var(--safe-bottom));
    display:flex; flex-direction:column; gap:8px; z-index:1000;
  }
  .map-controls .icon-btn{
    background:var(--bg);
    box-shadow:var(--shadow);
    width:44px; height:44px;
  }
  .map-controls .icon-btn svg{width:20px; height:20px;}

  @media (hover:none){
    .icon-btn{min-width:44px; min-height:44px;}
    .cat-item{padding:14px;}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-logo" viewBox="0 0 24 24">
      <path d="M3 21V9l9-6 9 6v12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M8 21v-6a4 4 0 0 1 8 0v6" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="2" y1="21" x2="22" y2="21" stroke="currentColor" stroke-width="1.2"/>
    </symbol>
    <symbol id="i-menu" viewBox="0 0 24 24">
      <line x1="4" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="1.3"/>
      <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.3"/>
      <line x1="4" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="1.3"/>
    </symbol>
    <symbol id="i-locate" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.3"/>
      <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.3"/>
      <line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="1.3"/>
      <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.3"/>
      <line x1="2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="1.3"/>
      <line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.3"/>
    </symbol>
    <symbol id="i-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.3"/>
      <line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="1.3"/>
      <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.3"/>
      <line x1="2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="1.3"/>
      <line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.3"/>
      <line x1="4.9" y1="4.9" x2="7" y2="7" stroke="currentColor" stroke-width="1.3"/>
      <line x1="17" y1="17" x2="19.1" y2="19.1" stroke="currentColor" stroke-width="1.3"/>
      <line x1="4.9" y1="19.1" x2="7" y2="17" stroke="currentColor" stroke-width="1.3"/>
      <line x1="17" y1="7" x2="19.1" y2="4.9" stroke="currentColor" stroke-width="1.3"/>
    </symbol>
    <symbol id="i-moon" viewBox="0 0 24 24">
      <path d="M20 14.5A8 8 0 1 1 9.5 4 a6.5 6.5 0 0 0 10.5 10.5z"
            fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
    </symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24">
      <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.4"/>
      <polyline points="14,6 20,12 14,18" fill="none" stroke="currentColor" stroke-width="1.4"/>
    </symbol>
    <symbol id="i-spinner" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.3" stroke-opacity=".25"/>
      <path d="M20 12a8 8 0 0 0-8-8" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </symbol>
  </defs>
</svg>

<div id="app">
  <header>
    <div class="brand">
      <svg class="mark"><use href="#i-logo"/></svg>
      <h1>OPEN HOUSE OSAKA 2026</h1>
      <span class="sub">生きた建築ミュージアムフェスティバル大阪2025</span>
    </div>
    <button class="icon-btn" id="themeBtn" title="表示切替" aria-label="テーマ切替">
      <svg id="themeIcon"><use href="#i-moon"/></svg>
    </button>
    <button class="icon-btn" id="toggleFilter" title="カテゴリ" aria-label="カテゴリ">
      <svg><use href="#i-menu"/></svg>
    </button>
  </header>

  <aside id="panel" aria-hidden="true">
    <div class="panel-section">
      <div class="panel-label">
        <span>Index — カテゴリ</span>
        <span class="count"><span id="visibleCount">000</span> / <span id="totalCount">000</span></span>
      </div>
      <div class="action-row">
        <button id="selectAll">All</button>
        <button id="clearAll">Clear</button>
      </div>
      <div class="cat-list" id="catList"></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">About</div>
      <div class="about">
        まちに点在する建築・展示・空間を歩いて巡るためのマップ。
        地図はグレースケールに抑え、建築そのものに目が向くようにデザインしました。
      </div>
    </div>
  </aside>

  <div id="overlay"></div>
  <div id="map"></div>

  <div class="map-controls">
    <button class="icon-btn" id="locateBtn" title="現在地" aria-label="現在地">
      <svg><use href="#i-locate"/></svg>
    </button>
  </div>

  <div id="loading">Loading…</div>
  <div id="toast"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
(() => {
  const THEME_KEY = 'arc-map-theme';
  const TILE_LIGHT = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  const TILE_DARK  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';

  function getInitialTheme(){
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) return saved;
    // デフォルトを白ベース（light）に固定
    return 'light';
  }
  let currentTheme = getInitialTheme();

  const map = L.map('map', {
    zoomControl:true, attributionControl:true, preferCanvas:true,
    zoomSnap:.5,
  }).setView([34.6937, 135.5023], 14);

  const tileLayer = L.tileLayer(
    currentTheme === 'dark' ? TILE_DARK : TILE_LIGHT, {
    maxZoom:20, subdomains:'abcd',
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> · © <a href="https://carto.com/attributions">CARTO</a>',
  }).addTo(map);

  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeIcon').innerHTML =
      '<use href="' + (t === 'dark' ? '#i-sun' : '#i-moon') + '"/>';
    document.getElementById('themeColorMeta').setAttribute(
      'content', t === 'dark' ? '#0e0e10' : '#ffffff'
    );
    tileLayer.setUrl(t === 'dark' ? TILE_DARK : TILE_LIGHT);
  }
  applyTheme(currentTheme);

  const state = {
    categories:[], pois:[], markers:new Map(),
    active:new Set(),
    meMarker:null, meCircle:null,
    hasFitInitial:false,
  };

  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function showToast(msg, ms=2200){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(showToast._tid);
    showToast._tid = setTimeout(()=>t.classList.remove('show'), ms);
  }

  // ピン自体をカテゴリの色にし、枠線を排除
  function pinSvg(color){
    return '<svg viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M15 1.5 C 22.5 1.5 27.5 7 27.5 14 C 27.5 22.5 15 36 15 36 C 15 36 2.5 22.5 2.5 14 C 2.5 7 7.5 1.5 15 1.5 Z" fill="' + color + '"/>' +
      '<circle cx="15" cy="14" r="4.5" fill="var(--bg)"/>' +
      '</svg>';
  }
  function makeIcon(color){
    return L.divIcon({
      className:'',
      html:'<div class="poi-marker">' + pinSvg(color) + '</div>',
      iconSize:[30,38], iconAnchor:[15,36], popupAnchor:[0,-32],
    });
  }

  function popupHtml(poi){
    const cat = poi.category || {};
    const color = cat.color_code || '#999';
    const thumb = poi.thumbnail_url
      ? '<img class="pop-thumb" src="' + escapeHtml(poi.thumbnail_url) + '" onerror="this.style.display=\'none\'">'
      : '';
    const link = poi.detail_url
      ? '<a class="pop-link" href="' + escapeHtml(poi.detail_url) + '" target="_blank" rel="noopener">Read more <svg><use href="#i-arrow"/></svg></a>'
      : '';
    const desc = (poi.description || '').replace(/<br\s*\/?>/gi,'<br>');
    const addr = (poi.spot && (poi.spot.address || poi.spot.spot_name)) || '';
    return '<div class="pop">' + thumb +
      '<div class="pop-body">' +
        '<div class="pop-cat"><span class="dot" style="background:' + color + '"></span>' + escapeHtml(cat.category_name || '') + '</div>' +
        '<h3 class="pop-title">' + escapeHtml(poi.event_name || '') + '</h3>' +
        (addr ? '<div class="pop-addr">' + escapeHtml(addr) + '</div>' : '') +
        (desc ? '<div class="pop-desc">' + desc + '</div>' : '') +
        link +
      '</div></div>';
  }

  function renderCategories(){
    const el = document.getElementById('catList');
    const counts = {};
    state.pois.forEach(p=>{
      const id = p.category && p.category.category_id;
      if (id != null) counts[id] = (counts[id]||0) + 1;
    });
    el.innerHTML = state.categories.map(c =>
      '<label class="cat-item" data-id="' + c.category_id + '">' +
        '<input type="checkbox" data-id="' + c.category_id + '" checked>' +
        '<span class="cat-swatch" style="background:' + c.color_code + '"></span>' +
        '<span class="cat-name">' + escapeHtml(c.category_name) + '</span>' +
        '<span class="cat-num">' + String(counts[c.category_id]||0).padStart(2,'0') + '</span>' +
      '</label>'
    ).join('');
    el.querySelectorAll('input').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const id = cb.dataset.id;
        if (cb.checked) state.active.add(id); else state.active.delete(id);
        cb.closest('.cat-item').classList.toggle('off', !cb.checked);
        applyFilter();
      });
    });
    document.getElementById('totalCount').textContent = String(state.pois.length).padStart(3,'0');
  }

  function renderMarkers(){
    state.pois.forEach(poi=>{
      const lat = poi.spot && poi.spot.latitude;
      const lng = poi.spot && poi.spot.longitude;
      if (typeof lat !== 'number' || typeof lng !== 'number') return;
      const color = (poi.category && poi.category.color_code) || '#888';
      const m = L.marker([lat,lng], {icon:makeIcon(color)})
        .bindPopup(popupHtml(poi), {maxWidth:290, minWidth:270, closeButton:true});
      state.markers.set(poi.event_id, {marker:m, poi});
    });
    applyFilter();
  }

  function applyFilter(){
    let v = 0;
    state.markers.forEach(({marker, poi})=>{
      const id = String(poi.category && poi.category.category_id);
      if (state.active.has(id)) { marker.addTo(map); v++; }
      else map.removeLayer(marker);
    });
    document.getElementById('visibleCount').textContent = String(v).padStart(3,'0');
  }

  function setMeMarker(latlng, accuracy){
    if (state.meMarker) map.removeLayer(state.meMarker);
    if (state.meCircle) map.removeLayer(state.meCircle);
    state.meMarker = L.marker(latlng, {
      icon: L.divIcon({
        className:'', html:'<div class="me-marker"></div>',
        iconSize:[16,16], iconAnchor:[8,8],
      }),
      zIndexOffset:1000,
    }).addTo(map).bindPopup('現在地 / You are here');
    if (accuracy){
      state.meCircle = L.circle(latlng, {
        radius:accuracy, color:'#0a0a0a', weight:1,
        fillColor:'#0a0a0a', fillOpacity:.05,
      }).addTo(map);
    }
  }

  function locate(opts){
    opts = opts || {};
    const silent = !!opts.silent;
    const recenter = opts.recenter !== false;
    if (!navigator.geolocation){
      if (!silent) showToast('位置情報に非対応のブラウザです');
      return Promise.reject();
    }
    const btn = document.getElementById('locateBtn');
    btn.classList.add('active', 'loading');
    btn.querySelector('svg').innerHTML = '<use href="#i-spinner"/>';

    return new Promise((resolve, reject)=>{
      navigator.geolocation.getCurrentPosition(pos=>{
        const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy;
        const ll = [lat, lng];
        setMeMarker(ll, acc);
        if (recenter){
          map.setView(ll, Math.max(map.getZoom(), 15), {animate:true});
        }
        btn.classList.remove('loading');
        btn.querySelector('svg').innerHTML = '<use href="#i-locate"/>';
        setTimeout(()=>btn.classList.remove('active'), 1200);
        resolve(ll);
      }, err=>{
        btn.classList.remove('active','loading');
        btn.querySelector('svg').innerHTML = '<use href="#i-locate"/>';
        if (!silent){
          const msg = err.code === 1 ? '位置情報が拒否されました'
                   : err.code === 2 ? '位置情報を取得できません'
                   : err.code === 3 ? '位置情報の取得がタイムアウトしました'
                   : '位置情報エラー';
          showToast(msg);
        }
        reject(err);
      }, {enableHighAccuracy:true, timeout:10000, maximumAge:60000});
    });
  }

  function togglePanel(force){
    const panel = document.getElementById('panel');
    const overlay = document.getElementById('overlay');
    const btn = document.getElementById('toggleFilter');
    const open = force !== undefined ? force : !panel.classList.contains('open');
    panel.classList.toggle('open', open);
    overlay.classList.toggle('show', open);
    btn.classList.toggle('active', open);
    panel.setAttribute('aria-hidden', String(!open));
    setTimeout(()=>map.invalidateSize(), 300);
  }

  document.getElementById('locateBtn').addEventListener('click', ()=>locate());
  document.getElementById('toggleFilter').addEventListener('click', ()=>togglePanel());
  document.getElementById('overlay').addEventListener('click', ()=>togglePanel(false));
  document.getElementById('themeBtn').addEventListener('click', ()=>{
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem(THEME_KEY, currentTheme);
    applyTheme(currentTheme);
  });
  document.getElementById('selectAll').addEventListener('click', ()=>{
    document.querySelectorAll('#catList input').forEach(cb=>{
      cb.checked = true; state.active.add(cb.dataset.id);
      cb.closest('.cat-item').classList.remove('off');
    });
    applyFilter();
  });
  document.getElementById('clearAll').addEventListener('click', ()=>{
    document.querySelectorAll('#catList input').forEach(cb=>{
      cb.checked = false;
      cb.closest('.cat-item').classList.add('off');
    });
    state.active.clear();
    applyFilter();
  });

  // OS設定変更時の自動追従リスナーを無効化（デフォルト白固定のため）
  /*
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e=>{
    if (!localStorage.getItem(THEME_KEY)){
      currentTheme = e.matches ? 'dark' : 'light';
      applyTheme(currentTheme);
    }
  });
  */

  fetch('pois.json')
    .then(r=>{ if(!r.ok) throw new Error('pois.json 読み込みエラー ('+r.status+')'); return r.json(); })
    .then(data=>{
      state.categories = data.categories || [];
      state.pois = (data.pois || []).filter(p=>
        p.spot && typeof p.spot.latitude === 'number' && typeof p.spot.longitude === 'number'
      );
      state.categories.forEach(c=> state.active.add(String(c.category_id)));
      renderCategories();
      renderMarkers();

      const b = L.latLngBounds(state.pois.map(p=>[p.spot.latitude, p.spot.longitude]));
      if (b.isValid()){
        map.fitBounds(b, {padding:[40,40]});
        state.hasFitInitial = true;
      }
      document.getElementById('loading').style.display='none';

      locate({silent:true, recenter:false}).then(ll=>{
        if (b.isValid() && b.pad(0.5).contains(ll)){
          map.setView(ll, Math.max(15, map.getZoom()), {animate:true});
        } else if (b.isValid()){
          const extended = b.extend(ll);
          map.fitBounds(extended, {padding:[50,50], maxZoom:14});
        }
      }).catch(()=>{});
    })
    .catch(err=>{
      document.getElementById('loading').textContent = 'Error: ' + err.message;
      console.error(err);
    });
})();
</script>
</body>
</html>
